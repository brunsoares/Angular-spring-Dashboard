<mat-card>
  <mat-toolbar> Formulário de cursos </mat-toolbar>
  <mat-card-content>
    <form [formGroup]="form" class="min-width">
      <mat-form-field class="full-width">
        <mat-label>Nome do curso:</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Categoria:</mat-label>
        <mat-select formControlName="category">
          <mat-option value="Frontend">Front-end</mat-option>
          <mat-option value="Backend">Backend</mat-option>
          <mat-option value="Programming">Programação</mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button (click)="onSubmit()">Salvar</button>
    <button mat-raised-button (click)="onCancel()">Cancelar</button>
  </mat-card-actions>
</mat-card>
