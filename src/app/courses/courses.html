<mat-card>
  <mat-toolbar> Cursos </mat-toolbar>

  @if (pageCourses$ | async; as pageCourses) {
    <mat-table [dataSource]="pageCourses.content" class="column-flex">
      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Nome</mat-header-cell>
        <mat-cell *matCellDef="let element">{{ element.name }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="category">
        <mat-header-cell *matHeaderCellDef>Categoria</mat-header-cell>
        <mat-cell *matCellDef="let element">
          {{ element.category }}
          <mat-icon fontIcon="{{ element.category | category }}"></mat-icon>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef class="action-column">
          <button mat-mini-fab (click)="onAdd()">
            <mat-icon>add</mat-icon>
          </button>
        </mat-header-cell>
        <mat-cell *matCellDef="let course" class="action-column">
          <button matIconButton (click)="onEdit(course)">
            <mat-icon>edit</mat-icon>
          </button>
          <button matIconButton (click)="onDelete(course)">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: columns"></mat-row>
    </mat-table>
    <mat-paginator
      #paginator
      [pageIndex]="pageIndex"
      [pageSize]="pageSize"
      [length]="pageCourses.totalElements"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="onPageChange($event)"
    >
    </mat-paginator>
  } @else {
    <div class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>
  }
</mat-card>
