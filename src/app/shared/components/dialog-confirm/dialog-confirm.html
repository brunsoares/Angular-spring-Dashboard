<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content> {{ data.message }} </mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close (click)="onCloseDialog(true)">Sim</button>
  <button matButton mat-dialog-close (click)="onCloseDialog(false)">Não</button>
</mat-dialog-actions>
